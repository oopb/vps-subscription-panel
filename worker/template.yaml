    - "+.xiaohongshu.com"
    - "+.xhscdn.com"
    - "+.xhscdn.net"
    - "+.xhslink.com"
    - "+.xhsimg.com"
    - "+.taobao.com"
    - "+.tmall.com"
    - "+.tbcdn.cn"
