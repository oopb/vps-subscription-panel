tun:
  enable: true
  stack: mixed
  mtu: 1492
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  cache-algorithm: arc
  ipv6: true
  prefer-ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.localdomain"
    - localhost.ptlogin2.qq.com
    - time.windows.com
    - time.apple.com
    - time.android.com
    - "+.xn--ngstr-lra8j.com"
    - "+.ntp.org.cn"
    - "+.pool.ntp.org"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:private,cn,geolocation-cn,apple-cn,microsoft@cn,steam@cn":
      - 223.5.5.5
      - 119.29.29.29
    "+.google.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.googleapis.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.googleapis.cn":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gstatic.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gvt1.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gvt2.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gvt3.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.googleusercontent.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.ggpht.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.android.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.xn--ngstr-lra8j.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.openai.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.chatgpt.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.anthropic.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.claude.ai":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.claude.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
  nameserver:
    - https://1.1.1.1/dns-query#PROXY
    - https://1.0.0.1/dns-query#PROXY
    - https://dns.google/dns-query#PROXY
  fallback:
    - https://1.1.1.1/dns-query#PROXY
    - https://dns.google/dns-query#PROXY
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

