mixed-port: 7897
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb

sniffer:
  enable: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.push.apple.com"
    - "+.googlevideo.com"
    - "+.douyin.com"
    - "+.douyincdn.com"
    - "+.douyinpic.com"
    - "+.douyinstatic.com"
    - "+.douyinliving.com"
    - "+.amemv.com"
    - "+.snssdk.com"
    - "+.byteimg.com"
    - "+.pstatp.com"
    - "+.xiaohongshu.com"
    - "+.xhscdn.com"
    - "+.xhscdn.net"
    - "+.xhslink.com"
    - "+.xhsimg.com"
    - "+.taobao.com"
    - "+.tmall.com"
    - "+.tbcdn.cn"
    - "+.alicdn.com"
    - "+.alibaba.com"
    - "+.alibabausercontent.com"
    - "+.alipay.com"
    - "+.alipayobjects.com"
    - "+.goofish.com"
    - "+.idlefish.com"
    - "+.aliyun.com"
    - "+.aliyuncs.com"
    - "+.mmstat.com"
    - "+.cainiao.com"
    - "+.amap.com"
    - "+.autonavi.com"
    - "+.115.com"
    - "+.115cdn.com"
    - "+.115cdn.net"
    - "+.115img.com"
    - "+.116cd.cn"
    - "+.116cd.com"
    - "+.116cd.net"
    - "+.anxia.com"
    - "+.sq.cc"
    - fhnfile.oss-cn-shenzhen.aliyuncs.com
tun:
  enable: true
  stack: mixed
  mtu: 1492
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  cache-algorithm: arc
  ipv6: true
  prefer-ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.localdomain"
    - localhost.ptlogin2.qq.com
    - time.windows.com
    - time.apple.com
    - time.android.com
    - "+.xn--ngstr-lra8j.com"
    - "+.ntp.org.cn"
    - "+.pool.ntp.org"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:private,cn,geolocation-cn,apple-cn,microsoft@cn,steam@cn":
      - 223.5.5.5
      - 119.29.29.29
    "+.google.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.googleapis.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.googleapis.cn":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gstatic.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gvt1.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gvt2.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.gvt3.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.googleusercontent.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.ggpht.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.android.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.xn--ngstr-lra8j.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.openai.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.chatgpt.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.anthropic.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.claude.ai":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "+.claude.com":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query#PROXY
      - https://dns.google/dns-query#PROXY
  nameserver:
    - https://1.1.1.1/dns-query#PROXY
    - https://1.0.0.1/dns-query#PROXY
    - https://dns.google/dns-query#PROXY
  fallback:
    - https://1.1.1.1/dns-query#PROXY
    - https://dns.google/dns-query#PROXY
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:


proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - DIRECT

    url: https://www.gstatic.com/generate_204
  - name: AUTO
    type: url-test
    proxies:

    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true


rules:
  
  # 核心优化：强制阿里系应用放弃 QUIC (UDP 443)，瞬间回退 TCP 解决转圈慢的问题
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,alibaba)),REJECT

  # 泄漏测试站点强制走代理，避免 geosite 误判为国内直连
  - DOMAIN-SUFFIX,browserleaks.com,PROXY
  - DOMAIN-SUFFIX,browserleaks.org,PROXY
  - DOMAIN-SUFFIX,browserleaks.net,PROXY
  - DOMAIN-SUFFIX,dnsleaktest.com,PROXY
  - DOMAIN-SUFFIX,ipleak.net,PROXY

  - GEOSITE,private,DIRECT
  - GEOSITE,alibaba,DIRECT

  - PROCESS-NAME,ssh.exe,DIRECT
  - PROCESS-NAME,sftp.exe,DIRECT
  - PROCESS-NAME,scp.exe,DIRECT
  - DST-PORT,22,DIRECT

  # Tailscale 控制面 / DERP / 登录相关域名直连
  - DOMAIN-SUFFIX,tailscale.com,DIRECT
  - DOMAIN-SUFFIX,ts.net,DIRECT

  # Tailscale IPv4 / IPv6 虚拟网段直连
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR6,fd7a:115c:a1e0::/48,DIRECT,no-resolve

  # 学校服务器 Tailscale IP
  - IP-CIDR,100.116.168.113/32,DIRECT,no-resolve

  # Tailscale 程序本身直连，Windows 下有用
  - PROCESS-NAME,tailscale.exe,DIRECT
  - PROCESS-NAME,tailscaled.exe,DIRECT
  - PROCESS-NAME,tailscale-ipn.exe,DIRECT

  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - DOMAIN-KEYWORD,buaa,DIRECT
  - DOMAIN-KEYWORD,cnki,DIRECT

  - RULE-SET,reject,REJECT
  - RULE-SET,adblockmihomo,REJECT

  # - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,cncidr,DIRECT

  # 代理规则 (AI 品牌与 Google 核心服务)
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,anthropic.com,PROXY
  - DOMAIN-SUFFIX,claude.ai,PROXY
  - DOMAIN-SUFFIX,claude.com,PROXY
  - DOMAIN-SUFFIX,google.com,PROXY
  - DOMAIN-SUFFIX,googleapis.com,PROXY
  - DOMAIN-SUFFIX,googleapis.cn,PROXY
  - DOMAIN-SUFFIX,gstatic.com,PROXY
  - DOMAIN-SUFFIX,gvt1.com,PROXY
  - DOMAIN-SUFFIX,gvt2.com,PROXY
  - DOMAIN-SUFFIX,gvt3.com,PROXY
  - DOMAIN-SUFFIX,googleusercontent.com,PROXY
  - DOMAIN-SUFFIX,ggpht.com,PROXY
  - DOMAIN-SUFFIX,android.com,PROXY
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,PROXY

  # 基础规则集匹配
  - GEOSITE,google,PROXY
  - GEOSITE,youtube,PROXY
  - GEOSITE,telegram,PROXY
  - GEOSITE,github,PROXY
  - GEOSITE,category-games@cn,DIRECT
  - GEOSITE,apple-cn,DIRECT
  - GEOSITE,apple,DIRECT
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,steam@cn,DIRECT
  - DOMAIN-SUFFIX,cn,DIRECT
  # - DOMAIN-SUFFIX,中国,DIRECT
  # - DOMAIN-SUFFIX,公司,DIRECT
  # - DOMAIN-SUFFIX,网络,DIRECT

  # ===== 兜底 =====
  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - GEOSITE,geolocation-!cn,PROXY
  - MATCH,PROXY

rule-providers:
  adblockmihomo:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomo.yaml"
    path: ./ruleset/adblockmihomo.yaml
    interval: 86400

  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
