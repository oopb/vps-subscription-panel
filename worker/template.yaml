proxy-groups:
  - name: AUTO
    type: url-test
    proxies:
      - vless-reality
      - tuic-443
      - vless-reality-9929
      - tuic-443-9929
      - ccs-tuic-443
      - ccs-tuic-443-ipv6

      - hk-vless
      - jp-vless
      - hk-tuic
      - us-vless
      - us-tuic
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - DIRECT

      - vless-reality
      - tuic-443
      - vless-reality-9929
      - tuic-443-9929
      - ccs-tuic-443
      - ccs-tuic-443-ipv6

      - hk-vless
      - jp-vless
      - hk-tuic
      - us-vless
      - us-tuic
    url: https://www.gstatic.com/generate_204
    interval: 300

rules:
  # 核心优化：强制阿里系应用放弃 QUIC (UDP 443)，瞬间回退 TCP 解决转圈慢的问题
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,alibaba)),REJECT

  # 泄漏测试站点强制走代理，避免 geosite 误判为国内直连
  - DOMAIN-SUFFIX,browserleaks.com,PROXY
  - DOMAIN-SUFFIX,browserleaks.org,PROXY
  - DOMAIN-SUFFIX,browserleaks.net,PROXY
  - DOMAIN-SUFFIX,dnsleaktest.com,PROXY
  - DOMAIN-SUFFIX,ipleak.net,PROXY

  - GEOSITE,private,DIRECT
  - GEOSITE,alibaba,DIRECT

  - DST-PORT,22,DIRECT

  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - DOMAIN-KEYWORD,buaa,DIRECT
  - DOMAIN-KEYWORD,cnki,DIRECT

  - RULE-SET,reject,REJECT
  - RULE-SET,adblockmihomo,REJECT

  # - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,cncidr,DIRECT

  # 代理规则 (AI 品牌与 Google 核心服务)
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,anthropic.com,PROXY
  - DOMAIN-SUFFIX,claude.ai,PROXY
  - DOMAIN-SUFFIX,claude.com,PROXY
  - DOMAIN-SUFFIX,google.com,PROXY
  - DOMAIN-SUFFIX,googleapis.com,PROXY
  - DOMAIN-SUFFIX,googleapis.cn,PROXY
  - DOMAIN-SUFFIX,gstatic.com,PROXY
  - DOMAIN-SUFFIX,gvt1.com,PROXY
  - DOMAIN-SUFFIX,gvt2.com,PROXY
  - DOMAIN-SUFFIX,gvt3.com,PROXY
  - DOMAIN-SUFFIX,googleusercontent.com,PROXY
  - DOMAIN-SUFFIX,ggpht.com,PROXY
  - DOMAIN-SUFFIX,android.com,PROXY
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,PROXY

  # 基础规则集匹配
  - GEOSITE,google,PROXY
  - GEOSITE,youtube,PROXY
  - GEOSITE,telegram,PROXY
  - GEOSITE,github,PROXY
  - GEOSITE,category-games@cn,DIRECT
  - GEOSITE,apple-cn,DIRECT
  - GEOSITE,apple,DIRECT
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,steam@cn,DIRECT
  - DOMAIN-SUFFIX,cn,DIRECT
  # - DOMAIN-SUFFIX,中国,DIRECT
  # - DOMAIN-SUFFIX,公司,DIRECT
  # - DOMAIN-SUFFIX,网络,DIRECT

  # ===== 兜底 =====
  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - GEOSITE,geolocation-!cn,PROXY
  - MATCH,PROXY

